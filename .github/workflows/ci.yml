name: ci

# Laptop-mode CI: builds the core + bindings in stub mode (no GPU/NCCL) and runs
# the unit tests for the topology parser and id serialization. The `--features
# nccl` path is exercised on a GPU host, not in CI.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test -p gradsync-core
      - run: cargo build --workspace   # stub mode, no nccl feature

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip maturin pytest
      - name: Build wheel (stub mode)
        working-directory: bindings
        run: maturin build --release -o ../wheels
      - run: python -m pip install wheels/gradsync-*.whl
      - name: Import smoke test
        run: python -c "import gradsync; print('gradsync', gradsync.__version__)"
      - name: Unit tests (bucketing, GPU-free)
        run: pytest -q --tb=short python/tests/
