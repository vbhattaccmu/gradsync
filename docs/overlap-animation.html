<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>gradsync: Communication/Compute Overlap</title>
  <style>
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f8f7f5;
      --text-primary: #1a1a1a;
      --text-secondary: #666666;
      --border: #e0ddd8;
      --compute: #2563eb;
      --comm: #d97706;
      --idle: #ef4444;
      --neutral-light: #d1d5db;
      --accent: #2563eb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #0f0f0f;
        --bg-secondary: #1a1a1a;
        --text-primary: #f0f0f0;
        --text-secondary: #a0a0a0;
        --border: #333333;
        --compute: #60a5fa;
        --comm: #fbbf24;
        --idle: #f87171;
        --neutral-light: #4b5563;
      }
    }

    :root[data-theme="light"] {
      --bg-primary: #ffffff;
      --bg-secondary: #f8f7f5;
      --text-primary: #1a1a1a;
      --text-secondary: #666666;
      --border: #e0ddd8;
      --compute: #2563eb;
      --comm: #d97706;
      --idle: #ef4444;
      --neutral-light: #d1d5db;
    }

    :root[data-theme="dark"] {
      --bg-primary: #0f0f0f;
      --bg-secondary: #1a1a1a;
      --text-primary: #f0f0f0;
      --text-secondary: #a0a0a0;
      --border: #333333;
      --compute: #60a5fa;
      --comm: #fbbf24;
      --idle: #f87171;
      --neutral-light: #4b5563;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      padding: 1rem;
      line-height: 1.5;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    .header {
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .logo {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin: 0;
      letter-spacing: -0.02em;
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: 0.85rem;
      max-width: 600px;
      margin: 0.5rem auto 0;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    button {
      padding: 0.5rem 1rem;
      border: 1px solid var(--border);
      background: var(--bg-secondary);
      color: var(--text-primary);
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.2s;
      flex: 1;
      min-width: 80px;
    }

    button:hover {
      background: var(--compute);
      color: white;
      border-color: var(--compute);
    }

    button:active {
      transform: scale(0.98);
    }

    .timeline-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .timeline {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1rem;
    }

    .timeline-title {
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-primary);
    }

    .timeline-subtitle {
      display: none;
    }

    .phases {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .phase-group {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .phase-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
    }

    .phase-bar {
      display: flex;
      height: 24px;
      background: var(--bg-primary);
      border-radius: 2px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .phase-segment {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      font-weight: 600;
      color: white;
      font-family: "Monaco", "Courier New", monospace;
      transition: width 0.05s linear;
    }

    .segment-compute {
      background: var(--compute);
    }

    .segment-comm {
      background: var(--comm);
    }

    .segment-idle {
      background: var(--idle);
      opacity: 0.3;
    }

    .segment-hidden {
      background: var(--neutral-light);
      opacity: 0.2;
    }

    .timeline-info {
      display: flex;
      justify-content: space-between;
      padding: 0.75rem;
      background: var(--bg-primary);
      border-radius: 3px;
      border: 1px solid var(--border);
      font-size: 0.75rem;
      gap: 0.5rem;
    }

    .info-item {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
      flex: 1;
    }

    .info-label {
      color: var(--text-secondary);
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .info-value {
      font-family: "Monaco", "Courier New", monospace;
      font-weight: 600;
      color: var(--text-primary);
      font-size: 0.8rem;
    }

    .legend {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
      margin-top: 1rem;
      padding: 1rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 4px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
    }

    .legend-box {
      width: 12px;
      height: 12px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .legend-compute { background: var(--compute); }
    .legend-comm { background: var(--comm); }
    .legend-idle { background: var(--idle); opacity: 0.3; }

    .benefit-box {
      margin-top: 1.5rem;
      padding: 1rem;
      background: var(--compute);
      color: white;
      border-radius: 4px;
      text-align: center;
    }

    .benefit-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      opacity: 0.9;
      margin-bottom: 0.5rem;
    }

    .benefit-value {
      font-size: 1.75rem;
      font-weight: 600;
      font-family: "Monaco", "Courier New", monospace;
    }

    @media (max-width: 768px) {
      .timeline-container {
        grid-template-columns: 1fr;
        gap: 0.75rem;
      }

      h1 {
        font-size: 1.3rem;
      }

      .logo {
        width: 36px;
        height: 36px;
      }

      .logo-container {
        gap: 0.5rem;
      }

      .legend {
        grid-template-columns: 1fr;
        gap: 0.5rem;
      }

      button {
        min-width: 70px;
        padding: 0.45rem 0.8rem;
        font-size: 0.75rem;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 0.75rem;
      }

      .header {
        margin-bottom: 1rem;
      }

      h1 {
        font-size: 1.2rem;
      }

      .subtitle {
        font-size: 0.8rem;
      }

      .controls {
        gap: 0.4rem;
        margin-bottom: 0.75rem;
      }

      button {
        min-width: 60px;
        padding: 0.4rem 0.6rem;
        font-size: 0.7rem;
      }

      .timeline {
        padding: 0.75rem;
      }

      .phase-bar {
        height: 20px;
      }

      .benefit-value {
        font-size: 1.5rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .phase-segment {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo-container">
        <div class="logo">
          <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
            <rect x="8" y="8" width="12" height="28" rx="2" fill="var(--compute)" opacity="0.9"/>
            <rect x="28" y="12" width="12" height="24" rx="2" fill="var(--comm)" opacity="0.8"/>
            <circle cx="24" cy="24" r="3" fill="var(--text-primary)" opacity="0.4"/>
            <path d="M 14 38 L 20 42 L 14 42 Z" fill="var(--compute)" opacity="0.6"/>
            <path d="M 34 38 L 40 42 L 34 42 Z" fill="var(--comm)" opacity="0.6"/>
          </svg>
        </div>
        <h1>gradsync</h1>
      </div>
      <p class="subtitle">Communication/compute overlap in DDP training</p>
    </div>

    <div class="controls">
      <button id="playBtn">▶ Play</button>
      <button id="resetBtn">↻ Reset</button>
      <button id="speedBtn">1× Speed</button>
    </div>

    <div class="timeline-container">
      <!-- Naive approach -->
      <div class="timeline">
        <div class="timeline-title">Naive DDP</div>

        <div class="phases">
          <div class="phase-group">
            <div class="phase-label">Backward</div>
            <div class="phase-bar">
              <div class="phase-segment segment-compute" id="naive-backward" style="width: 0%"></div>
            </div>
          </div>

          <div class="phase-group">
            <div class="phase-label">AllReduce</div>
            <div class="phase-bar">
              <div class="phase-segment segment-comm" id="naive-allreduce" style="width: 0%"></div>
            </div>
          </div>

          <div class="phase-group">
            <div class="phase-label">Step</div>
            <div class="phase-bar">
              <div class="phase-segment segment-compute" id="naive-step" style="width: 0%"></div>
            </div>
          </div>
        </div>

        <div class="timeline-info">
          <div class="info-item">
            <span class="info-label">Total step time</span>
            <span class="info-value" id="naive-total">0 ms</span>
          </div>
          <div class="info-item">
            <span class="info-label">Communication</span>
            <span class="info-value" id="naive-comm-time">0 ms</span>
          </div>
        </div>
      </div>

      <!-- gradsync approach -->
      <div class="timeline">
        <div class="timeline-title">gradsync (Overlapped)</div>

        <div class="phases">
          <div class="phase-group">
            <div class="phase-label">Backward + AllReduce</div>
            <div class="phase-bar">
              <div class="phase-segment segment-compute" id="overlap-backward" style="width: 0%"></div>
              <div class="phase-segment segment-comm" id="overlap-allreduce" style="width: 0%"></div>
              <div class="phase-segment segment-hidden" id="overlap-hidden" style="width: 0%"></div>
            </div>
          </div>

          <div class="phase-group">
            <div class="phase-label">Step</div>
            <div class="phase-bar">
              <div class="phase-segment segment-compute" id="overlap-step" style="width: 0%"></div>
            </div>
          </div>
        </div>

        <div class="timeline-info">
          <div class="info-item">
            <span class="info-label">Total step time</span>
            <span class="info-value" id="overlap-total">0 ms</span>
          </div>
          <div class="info-item">
            <span class="info-label">Speedup</span>
            <span class="info-value" id="speedup">0%</span>
          </div>
        </div>
      </div>
    </div>

    <div class="legend">
      <div class="legend-item">
        <div class="legend-box legend-compute"></div>
        <span>Compute</span>
      </div>
      <div class="legend-item">
        <div class="legend-box legend-comm"></div>
        <span>Communication</span>
      </div>
      <div class="legend-item">
        <div class="legend-box legend-idle"></div>
        <span>Idle</span>
      </div>
    </div>

    <div class="benefit-box">
      <div class="benefit-title">Speedup</div>
      <div class="benefit-value" id="benefit">—</div>
    </div>
  </div>

  <script>
    const DURATION = 6000; // 6 seconds total
    const PHASES = {
      backward: 30,    // 30% of time unit
      allreduce: 20,   // 20% of time unit
      step: 10         // 10% of time unit
    };

    let isPlaying = false;
    let progress = 0;
    let speed = 1;
    let animationId = null;
    let lastTime = 0;

    const playBtn = document.getElementById('playBtn');
    const resetBtn = document.getElementById('resetBtn');
    const speedBtn = document.getElementById('speedBtn');

    playBtn.addEventListener('click', togglePlay);
    resetBtn.addEventListener('click', reset);
    speedBtn.addEventListener('click', changeSpeed);

    function togglePlay() {
      isPlaying = !isPlaying;
      playBtn.textContent = isPlaying ? '⏸ Pause' : '▶ Play';
      if (isPlaying) {
        lastTime = performance.now();
        animate();
      } else {
        cancelAnimationFrame(animationId);
      }
    }

    function reset() {
      isPlaying = false;
      progress = 0;
      playBtn.textContent = '▶ Play';
      cancelAnimationFrame(animationId);
      update();
    }

    function changeSpeed() {
      const speeds = [1, 1.5, 2];
      const idx = speeds.indexOf(speed);
      speed = speeds[(idx + 1) % speeds.length];
      speedBtn.textContent = `${speed}× Speed`;
    }

    function animate() {
      const now = performance.now();
      const delta = now - lastTime;
      lastTime = now;

      progress = Math.min(progress + delta * speed / DURATION, 1);
      update();

      if (progress < 1) {
        animationId = requestAnimationFrame(animate);
      } else {
        isPlaying = false;
        playBtn.textContent = '▶ Play';
      }
    }

    function update() {
      // Naive timeline
      const naiveBackwardEnd = PHASES.backward;
      const naiveAllReduceEnd = naiveBackwardEnd + PHASES.allreduce;
      const naiveTotalEnd = naiveAllReduceEnd + PHASES.step;

      const naiveBackwardPct = Math.min(progress * 100, naiveBackwardEnd);
      const naiveAllReducePct = Math.max(0, Math.min(progress * 100 - naiveBackwardEnd, PHASES.allreduce));
      const naiveStepPct = Math.max(0, Math.min(progress * 100 - naiveAllReduceEnd, PHASES.step));

      updateBar('naive-backward', naiveBackwardPct, PHASES.backward);
      updateBar('naive-allreduce', naiveAllReducePct, PHASES.allreduce);
      updateBar('naive-step', naiveStepPct, PHASES.step);

      const naiveTotalTime = (naiveTotalEnd / 100) * DURATION;

      // Overlapped timeline
      const overlapBackwardEnd = PHASES.backward;
      const overlapAllReduceEnd = Math.min(PHASES.backward + PHASES.allreduce, PHASES.backward + PHASES.allreduce * 0.75);
      const overlapTotalEnd = overlapAllReduceEnd + PHASES.step;

      const overlapBackwardPct = Math.min(progress * 100, PHASES.backward);
      const overlapAllReducePct = Math.max(0, Math.min(progress * 100 - (PHASES.backward - PHASES.allreduce * 0.25), PHASES.allreduce * 0.75));
      const overlapHiddenPct = Math.max(0, Math.min(progress * 100 - PHASES.backward, Math.min(PHASES.allreduce * 0.25, (progress * 100 - PHASES.backward))));
      const overlapStepPct = Math.max(0, Math.min(progress * 100 - overlapAllReduceEnd, PHASES.step));

      updateBar('overlap-backward', overlapBackwardPct, PHASES.backward);
      updateBar('overlap-allreduce', overlapAllReducePct, PHASES.allreduce * 0.75);
      updateBar('overlap-hidden', overlapHiddenPct, Math.min(PHASES.allreduce * 0.25, progress * 100 - PHASES.backward));
      updateBar('overlap-step', overlapStepPct, PHASES.step);

      const overlapTotalTime = (overlapTotalEnd / 100) * DURATION;

      // Update times
      const naiveMs = Math.round(naiveTotalTime);
      const overlapMs = Math.round(overlapTotalTime);
      const speedupMs = Math.round(naiveMs - overlapMs);
      const speedupPct = naiveMs > 0 ? Math.round((speedupMs / naiveMs) * 100) : 0;

      document.getElementById('naive-total').textContent = `${naiveMs} ms`;
      document.getElementById('naive-comm-time').textContent = `${Math.round((PHASES.allreduce / 100) * DURATION)} ms`;
      document.getElementById('overlap-total').textContent = `${overlapMs} ms`;
      document.getElementById('speedup').textContent = speedupPct > 0 ? `${speedupPct}% faster` : '—';
      document.getElementById('benefit').textContent = speedupMs > 0 ? `${speedupMs} ms saved per step` : '—';
    }

    function updateBar(elementId, currentPct, maxPct) {
      const el = document.getElementById(elementId);
      const width = (currentPct / maxPct) * 100;
      el.style.width = Math.max(0, Math.min(width, 100)) + '%';
      if (width > 10 && el.textContent.match(/\d+%/)) {
        el.textContent = Math.round((currentPct / 100) * (DURATION / 10)) + '%';
      }
    }

    // Initial render
    update();
  </script>
</body>
</html>
